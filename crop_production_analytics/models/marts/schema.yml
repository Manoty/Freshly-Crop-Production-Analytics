version: 2

models:
  - name: fct_production
    description: "Core fact table — production metrics by country, item and year"
    columns:
      - name: area_code
        data_tests:
          - not_null
      - name: item_code
        data_tests:
          - not_null
      - name: year
        data_tests:
          - not_null
      - name: element_category
        data_tests:
          - not_null
          - accepted_values:
              values:
                - 'Production'
                - 'Yield'
                - 'Area Harvested'
                - 'Animals Slaughtered'
      - name: value
        description: "Numeric measurement value — nulls excluded at model level"
        data_tests:
          - not_null

  - name: dim_areas
    description: "Dimension table — all countries and regions"
    columns:
      - name: area_code
        data_tests:
          - not_null
          - unique

  - name: dim_items
    description: "Dimension table — all crops and livestock items"
    columns:
      - name: item_code
        data_tests:
          - not_null
          - unique